name: Regulatory Update Check

on:
  schedule:
    # Run every 25 days (approximated as 1st and 26th of each month)
    - cron: '0 9 1,26 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run regulatory update check
        id: check
        run: |
          set +e
          OUTPUT=$(python scripts/check_regulatory_updates.py 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"
          # Save output for issue body
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Create issue if updates detected
        if: steps.check.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.check.outputs.output }}`;
            let findings = '';
            try {
              const parsed = JSON.parse(output);
              findings = (parsed.findings || []).map(f => `- ${f}`).join('\n');
            } catch {
              findings = output;
            }

            const body = `## Regulatory Update Check — Action Needed

            The scheduled regulatory monitoring has detected potential changes:

            ${findings}

            ### Next Steps
            1. Review the source pages linked in \`control_mappings.json\` → \`regulatory_sources\`
            2. If new circulars are confirmed, use \`propose_mapping_update\` + \`apply_mapping_update\` to update mappings
            3. Bump \`last_verified\` dates and publish a new release

            _This issue was created automatically by the regulatory-check workflow._
            `.replace(/^            /gm, '');

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'regulatory-update',
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔔 Regulatory update check — action needed',
                body: body,
                labels: ['regulatory-update', 'maintenance'],
              });
            } else {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `### Updated check (${new Date().toISOString().split('T')[0]})\n\n${findings}`,
              });
            }
